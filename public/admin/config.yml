backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/pages/home.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "seo_description", widget: "text" }
          - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - label: "Features"
            name: "features"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "select", options: ["building", "utilities", "location", "commute"] }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "amenities"
        label: "Amenities"
        file: "content/pages/amenities.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "seo_description", widget: "text" }
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "neighborhood"
        label: "Neighborhood"
        file: "content/pages/neighborhood.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "seo_description", widget: "text" }
          - label: "Highlights"
            name: "highlights"
            widget: "list"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "contact"
        label: "Contact"
        file: "content/pages/contact.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "SEO Description", name: "seo_description", widget: "text" }
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "units"
    label: "Apartment Units"
    file: "content/units.yaml"
    fields:
      - label: "Units"
        name: "units"
        widget: "list"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "URL Slug", name: "slug", widget: "string" }
          - { label: "Price Range", name: "price_range", widget: "string" }
          - { label: "Square Feet", name: "sq_ft", widget: "number", required: false }
          - { label: "Availability", name: "availability", widget: "select", options: ["Available", "Waitlist", "Call for Info"] }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Floor Plan Image", name: "floor_plan_image", widget: "image", required: false }
          - label: "Photos"
            name: "images"
            widget: "list"
            required: false
            field: { label: "Image", name: "image", widget: "image" }
          - { label: "Video URL (YouTube embed)", name: "video_url", widget: "string", required: false }
          - label: "Features"
            name: "features"
            widget: "list"
            field: { label: "Feature", name: "feature", widget: "string" }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "content/site.yaml"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Phone Number", name: "phone_number", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - label: "Address"
            name: "address"
            widget: "object"
            fields:
              - { label: "Street", name: "street", widget: "string" }
              - { label: "City", name: "city", widget: "string" }
              - { label: "State", name: "state", widget: "string" }
              - { label: "ZIP", name: "zip", widget: "string" }
          - label: "Colors"
            name: "colors"
            widget: "object"
            fields:
              - { label: "Primary", name: "primary", widget: "color", default: "#1a2744" }
              - { label: "Secondary (Accent)", name: "secondary", widget: "color", default: "#c9a96e" }
