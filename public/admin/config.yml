backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "home"
    label: "Home Page"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "content/home/hero.json"
        fields:
          - { label: "Subtitle", name: "subtitle", widget: "string", default: "East Lakeview · Chicago" }
          - { label: "Heading", name: "heading", widget: "string", default: "Elevated Living on Grace Street" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "CTA Text", name: "ctaText", widget: "string", default: "View Apartments" }
          - { label: "CTA Link", name: "ctaLink", widget: "string", default: "#apartments" }

  - name: "units"
    label: "Apartment Units"
    folder: "content/units"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Unit Type", name: "title", widget: "string" }
      - { label: "Price From", name: "priceFrom", widget: "string" }
      - { label: "Price To", name: "priceTo", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - label: "Features"
        name: "features"
        widget: "list"
        field: { label: "Feature", name: "feature", widget: "string" }
      - { label: "Sort Order", name: "order", widget: "number", default: 0 }

  - name: "amenities"
    label: "Amenities"
    folder: "content/amenities"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Icon (emoji)", name: "icon", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Sort Order", name: "order", widget: "number", default: 0 }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings/general.json"
        fields:
          - { label: "Property Name", name: "propertyName", widget: "string", default: "Grace Street Towers" }
          - { label: "Address", name: "address", widget: "string", default: "635 W. Grace St., Chicago, IL 60613" }
          - { label: "Phone", name: "phone", widget: "string", default: "(773) 871-1845" }
          - { label: "Email", name: "email", widget: "string", default: "manager@gracestreettowers.com" }
          - { label: "Office Hours", name: "officeHours", widget: "text", default: "Monday – Friday: 9:00 AM – 5:00 PM\nSaturday: By Appointment" }
          - { label: "Footer Text", name: "footerText", widget: "string", required: false }
